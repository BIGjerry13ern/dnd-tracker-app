<!DOCTYPE html>
<html>
<head>
    <title>Improper</title>
    <style>
        body { font-family: 'Verdana', sans-serif; background: #0c0c0c; color: #ddd; padding: 10px; max-width: 600px; margin: auto; }
        h1 { color: #ffd700; text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 20px; }
        .btn { background: #1a1a1a; border: 1px solid #444; color: #aaa; padding: 10px; cursor: pointer; flex: 1; }
        .btn:hover { background: #333; color: #ffd700; border-color: #ffd700; }
        .panel { display: none; background: #111; padding: 15px; border: 1px solid #222; }
        .active { display: block; }
        .item-card { border: 1px solid #444; padding: 10px; margin: 5px 0; background: #1a1a1a; }
        #log { height: 100px; overflow-y: auto; background: #050505; padding: 10px; font-size: 12px; border: 1px solid #222; }
    </style>
</head>
<body>

    <h1>IMPROPER</h1>

    <div class="tab-bar">
        <button class="btn" onclick="showTab('adventure')">Dungeons</button>
        <button class="btn" onclick="showTab('character')">Character</button>
        <button class="btn" onclick="showTab('shop')">Shop</button>
    </div>

    <!-- DUNGEON TAB -->
    <div id="adventure" class="panel active">
        <h2>Dungeons</h2>
        <p>Energy: <span id="p-energy">100/100</span> | Gold: <span id="p-gold">0</span></p>
        <div id="dungeon-list">
            <div class="item-card">
                <strong>Crypt of Despair</strong><br>Cost: 10 Energy<br>
                <button onclick="runDungeon(10, 50, 'Crypt')">Enter</button>
            </div>
            <div class="item-card">
                <strong>Demon's Lair</strong><br>Cost: 25 Energy<br>
                <button onclick="runDungeon(25, 200, 'Lair')">Enter</button>
            </div>
        </div>
        <div id="log" style="margin-top:15px;">Ready for battle...</div>
    </div>

    <!-- CHARACTER TAB -->
    <div id="character" class="panel">
        <h2>Gear</h2>
        <div id="equipped-gear">Weapon: None</div>
        <h3>Stats</h3>
        <p>Lvl: <span id="p-lvl">1</span> | XP: <span id="p-xp">0</span></p>
    </div>

    <!-- SHOP TAB -->
    <div id="shop" class="panel">
        <h2>Premium Shop</h2>
        <p>Gems: <span id="p-gems">0</span></p>
        <button onclick="buyGems()">Buy 100 Gems ($0.99)</button>
        <button onclick="buyEnergy()">Buy 50 Energy (10 Gems)</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBHFqEut_Y4Xq8VWy63I-fgQ5K-WDsNUAY",
            authDomain: "dnd-tracker-backend.firebaseapp.com",
            projectId: "dnd-tracker-backend",
            storageBucket: "dnd-tracker-backend.firebasestorage.app",
            messagingSenderId: "359211619885",
            appId: "1:359211619885:web:4203ebba0232d2e1e9caa4",
            measurementId: "G-BW0755NDVW"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let p = { energy: 100, gold: 0, gems: 0, lvl: 1, xp: 0, weapon: "Fists", loot: [] };
        let pId = localStorage.getItem('dnd-player-id');

        window.runDungeon = async function(cost, rewardGold, name) {
            if (p.energy < cost) { log("Need more energy!"); return; }
            p.energy -= cost;
            p.gold += rewardGold;
            p.xp += (cost * 2);
            log(`Cleared ${name}! Earned ${rewardGold} Gold.`);
            updateUI();
        };

        window.buyGems = function() {
            log("Opening Payment Gateway...");
            p.gems += 100; 
            updateUI();
        };

        window.buyEnergy = function() {
            if (p.gems >= 10) {
                p.gems -= 10;
                p.energy = 100;
                log("Energy Restored!");
                updateUI();
            } else {
                log("Not enough Gems!");
            }
        };

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML = msg + "<br>" + l.innerHTML;
        }

        function updateUI() {
            document.getElementById('p-energy').innerText = p.energy + "/100";
            document.getElementById('p-gold').innerText = p.gold;
            document.getElementById('p-gems').innerText = p.gems;
            document.getElementById('p-lvl').innerText = p.lvl;
            document.getElementById('equipped-gear').innerText = "Weapon: " + p.weapon;
        }

        window.showTab = (id) => {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        };

        updateUI();
    </script>
</body>
</html>
