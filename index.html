<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IMPROPER | The 48-Hour Abyss</title>
    <style>
        :root { --bg: #050505; --gold: #d4af37; --blood: #8b0000; --panel: #111; }
        body { background: var(--bg); color: #ccc; font-family: 'Courier New', monospace; padding: 20px; max-width: 800px; margin: auto; }
        h1 { color: var(--gold); text-align: center; border-bottom: 2px solid var(--blood); padding-bottom: 10px; text-transform: uppercase; }
        .ui-box { background: var(--panel); padding: 25px; border: 1px solid #333; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 15px; }
        .card { padding: 15px; background: #1a1a1a; border: 1px solid #444; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--gold); background: #222; }
        .stats-display { display: flex; justify-content: space-between; background: #000; padding: 10px; border: 1px solid var(--gold); margin-bottom: 15px; color: var(--gold); }
        .btn-main { padding: 15px; background: #1a1a1a; color: white; border: 1px solid #444; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-main:hover { border-color: var(--gold); }
        #log { height: 120px; overflow-y: scroll; background: #000; padding: 10px; border: 1px solid #222; font-size: 0.8em; color: #777; }
    </style>
</head>
<body>

    <h1>IMPROPER</h1>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="ui-box">
        <h2 id="setup-title">Initialize Protocol</h2>
        <div id="setup-options" class="grid"></div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="ui-box" style="display:none;">
        <div class="stats-display" id="stats-header"></div>
        <div id="story-text" style="margin: 20px 0; font-style:italic; font-size: 1.2em;"></div>
        <div id="choice-container" class="grid"></div>
        <h3>Event Log</h3>
        <div id="log"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // CONFIG: Replace with your Firebase settings
        const firebaseConfig = { apiKey: "AIza...", authDomain: "dnd-tracker.firebaseapp.com", projectId: "dnd-tracker", storageBucket: "dnd-tracker.appspot.com", appId: "1:..." };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- CLASSES ---
        const CLASSES = {
            "Warrior": { hp: 150, str: 15, agi: 5, int: 5, sta: 10 }, "Rogue": { hp: 90, str: 8, agi: 18, int: 8, sta: 6 },
            "Mage": { hp: 70, str: 3, agi: 7, int: 20, sta: 5 }, "Berserker": { hp: 120, str: 22, agi: 8, int: 2, sta: 12 },
            "Paladin": { hp: 140, str: 10, agi: 4, int: 10, sta: 15 }, "Necromancer": { hp: 85, str: 6, agi: 6, int: 18, sta: 8 },
            "Cleric": { hp: 110, str: 7, agi: 6, int: 12, sta: 15 }, "Ranger": { hp: 100, str: 9, agi: 15, int: 8, sta: 8 },
            "Assassin": { hp: 80, str: 10, agi: 22, int: 6, sta: 6 }, "Warlord": { hp: 130, str: 12, agi: 10, int: 10, sta: 12 }
        };

        // --- STORY ENGINE (48 Nodes) ---
        const STORY_NODES = Array.from({length: 48}, (_, i) => ({
            id: i + 1,
            text: `Hour ${i + 1}: The descent deepens. The shadows are hungry. ${i > 24 ? "The Abyss is collapsing." : "You are holding the line."}`,
            choices: [
                { text: "Fight", next: i + 1, risk: 0.1 + (i * 0.01), req: 'str', val: 5 + Math.floor(i/2) },
                { text: "Scout", next: i + 1, risk: 0.05, req: 'agi', val: 5 + Math.floor(i/2) }
            ]
        }));

        class GameEngine {
            constructor() {
                this.p = { mode: '', class: '', hp: 0, str: 0, agi: 0, int: 0, sta: 0, lvl: 1, hour: 0 };
                this.stage = 'mode';
            }

            renderSetup() {
                const options = document.getElementById('setup-options');
                if (this.stage === 'mode') {
                    ['Hardcore', 'Softcore'].forEach(m => {
                        const b = document.createElement('button');
                        b.className = 'card'; b.innerText = m;
                        b.onclick = () => { this.p.mode = m; this.stage = 'class'; this.renderSetup(); };
                        options.appendChild(b);
                    });
                } else {
                    Object.keys(CLASSES).forEach(c => {
                        const b = document.createElement('button');
                        b.className = 'card'; b.innerHTML = `<strong>${c}</strong>`;
                        b.onclick = () => { this.initGame(c); };
                        options.appendChild(b);
                    });
                }
            }

            initGame(className) {
                const s = CLASSES[className];
                this.p = { ...this.p, ...s, class: className, hour: 0 };
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                this.updateUI();
            }

            updateUI() {
                document.getElementById('stats-header').innerHTML = `<span>Class: ${this.p.class}</span><span>HP: ${this.p.hp}</span><span>STR: ${this.p.str}</span>`;
                const node = STORY_NODES[this.p.hour];
                document.getElementById('story-text').innerText = node.text;
                const cont = document.getElementById('choice-container'); cont.innerHTML = '';
                node.choices.forEach(c => {
                    const b = document.createElement('button'); b.className = 'btn-main';
                    b.innerText = `${c.text} [Req: ${c.req.toUpperCase()} ${c.val}]`;
                    b.onclick = () => this.process(c); cont.appendChild(b);
                });
            }

            process(c) {
                if (this.p[c.req] < c.val || Math.random() < c.risk) {
                    this.log("Damage taken!"); this.p.hp -= 20;
                    if(this.p.hp <= 0) {
                        this.log("You perished.");
                        if(this.p.mode === 'Hardcore') location.reload();
                        else { this.p.hp = 100; this.updateUI(); }
                    }
                } else {
                    this.p.hour++;
                    if(this.p.hour >= 48) { alert("YOU WON! LEVEL 75 REACHED."); location.reload(); }
                    this.updateUI();
                }
            }

            log(m) { const l = document.getElementById('log'); l.innerHTML = `> ${m}<br>${l.innerHTML}`; }
        }

        window.game = new GameEngine();
        window.game.renderSetup();
    </script>
</body>
</html>
