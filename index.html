<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IMPROPER 3D | Third Person</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #d4af37; pointer-events: none; }
        #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: #8b0000; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1 id="hp-display">HP: 100</h1>
        <p>Use W, A, S, D to Move | Click to Attack</p>
    </div>

    <div id="death-screen">
        <h1>YOU PERISHED</h1>
        <button onclick="location.reload()" style="padding:20px; cursor:pointer;">RESTART RUN</button>
    </div>

    <script>
        // --- ENGINE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- WORLD ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide })
        );
        floor.rotation.x = Math.PI / 2;
        scene.add(floor);

        // --- PLAYER (The 3rd Person Character) ---
        const player = new THREE.Mesh(
            new THREE.BoxGeometry(1, 2, 1),
            new THREE.MeshBasicMaterial({ color: 0xd4af37 })
        );
        player.position.y = 1;
        scene.add(player);

        // --- CAMERA FOLLOW SYSTEM ---
        camera.position.set(0, 5, 10);
        camera.lookAt(player.position);

        // --- CONTROLS & PHYSICS ---
        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => keys[e.key] = true);
        document.addEventListener('keyup', (e) => keys[e.key] = false);

        let hp = 100;
        let isDead = false;

        function update() {
            if (isDead) return;

            // Movement Logic
            const speed = 0.15;
            if (keys.w) player.position.z -= speed;
            if (keys.s) player.position.z += speed;
            if (keys.a) player.position.x -= speed;
            if (keys.d) player.position.x += speed;

            // Camera Follow
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 10;

            // Damage Loop (Example: Falling off map or getting hit)
            if (hp <= 0) {
                isDead = true;
                document.getElementById('death-screen').style.display = 'flex';
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        // --- START GAME ---
        update();
        
        // Window Resize
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
