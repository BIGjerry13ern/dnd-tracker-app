<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OAKHAVEN | Hustle Engine</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        .ui { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 10; }
        .joy { width: 120px; height: 120px; border: 4px solid #00ffcc; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #00ffcc; font-weight: bold; background: rgba(0,255,204,0.1); }
        .btn { width: 80px; height: 80px; border: 3px solid #ff0066; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; background: rgba(255,0,102,0.1); }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="ui">
        <div id="joy" class="joy">JOY</div>
        <div style="display:flex; gap: 20px;">
            <div class="btn" ontouchstart="jump()">JUMP</div>
            <div class="btn" ontouchstart="shoot()" style="border-color:#00ffcc;">FIRE</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const p = { x: 100, y: 300, vx: 0, vy: 0, crouch: false, facing: 1 };
    let bullets = [];

    const joy = document.getElementById('joy');
    joy.ontouchmove = (e) => {
        let touch = e.touches[0];
        let rect = joy.getBoundingClientRect();
        let dx = touch.clientX - (rect.left + 60);
        let dy = touch.clientY - (rect.top + 60);
        p.vx = dx / 8;
        p.facing = dx > 0 ? 1 : -1;
        p.crouch = dy > 30;
    };
    joy.ontouchend = () => { p.vx = 0; p.crouch = false; };

    function jump() { if(p.y >= 300) p.vy = -15; }
    function shoot() { bullets.push({ x: p.x, y: p.y + 20, dir: p.facing }); }

    function loop() {
        p.vy += 0.8; 
        p.y += p.vy;
        if(p.y > 300) { p.y = 300; p.vy = 0; }
        // Keep in frame
        p.x = Math.max(20, Math.min(canvas.width - 50, p.x + p.vx));

        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = p.crouch ? '#ff0066' : '#00ffcc';
        ctx.fillRect(p.x, p.y, 40, p.crouch ? 40 : 80);

        bullets.forEach((b, i) => {
            b.x += b.dir * 15;
            ctx.fillStyle = 'yellow';
            ctx.fillRect(b.x, b.y, 10, 5);
            if(b.x < 0 || b.x > canvas.width) bullets.splice(i, 1);
        });

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
