<!DOCTYPE html>
<html>
<head>
    <title>D&D Tracker</title>
</head>
<body>
    <h1>D&D Tracker</h1>
    <p id="status">Loading data...</p>
    <div id="campaign-display"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHFqEut_Y4Xq8VWy63I-fgQ5K-WDsNUAY",
            authDomain: "dnd-tracker-backend.firebaseapp.com",
            projectId: "dnd-tracker-backend",
            storageBucket: "dnd-tracker-backend.firebasestorage.app",
            messagingSenderId: "359211619885",
            appId: "1:359211619885:web:4203ebba0232d2e1e9caa4",
            measurementId: "G-BW0755NDVW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchCampaign() {
            try {
                const docRef = doc(db, "campaigns", "R1ZT7VavyTTMBzjGIi1h");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    document.getElementById("status").innerText = "Data Loaded!";
                    document.getElementById("campaign-display").innerText = "Campaign: " + docSnap.data().name;
                } else {
                    document.getElementById("status").innerText = "No such document!";
                }
            } catch (error) {
                document.getElementById("status").innerText = "Error loading data.";
                console.error(error);
            }
        }

        fetchCampaign();
    </script>
</body>
</html>
