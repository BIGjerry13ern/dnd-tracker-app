<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IMPROPER | The Abyss</title>
    <style>
        :root { --bg: #050505; --panel: #111; --gold: #d4af37; --blood: #8b0000; --text: #ccc; }
        body { background: var(--bg); color: var(--text); font-family: 'Verdana', sans-serif; padding: 20px; max-width: 900px; margin: auto; }
        h1 { color: var(--gold); border-bottom: 2px solid var(--blood); padding-bottom: 10px; text-align: center; text-transform: uppercase; }
        .layout { display: grid; grid-template-columns: 200px 1fr; gap: 20px; }
        .sidebar { background: var(--panel); padding: 15px; border: 1px solid #333; height: fit-content; }
        .content { background: var(--panel); padding: 20px; border: 1px solid #333; }
        .stat-bar { background: #000; padding: 8px; margin: 5px 0; color: var(--gold); border: 1px solid #222; font-size: 0.9em; }
        .btn-main { width: 100%; padding: 12px; background: #1a1a1a; color: white; border: 1px solid #444; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<h1>IMPROPER</h1>
<div id="game-screen" class="layout">
    <div class="sidebar">
        <div id="p-stats"></div>
    </div>
    <div class="content">
        <h2 id="hour-display">Hour 1/48</h2>
        <div id="story-text"></div>
        <div id="choice-container"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqOxn-sFCCOa1koOaDwQumiD8I0h70G-c",
        authDomain: "d-and-d-campaign-hub.firebaseapp.com",
        databaseURL: "https://d-and-d-campaign-hub-default-rtdb.firebaseio.com",
        projectId: "d-and-d-campaign-hub",
        storageBucket: "d-and-d-campaign-hub.firebasestorage.app",
        messagingSenderId: "953951157532",
        appId: "1:953951157532:web:5ec60c759ad8229ea6ced9",
        measurementId: "G-10KMRSH0HV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Initial state
    let player = { hp: 100, gold: 0, hour: 0 };

    async function saveGame() {
        await set(ref(db, 'saveData'), player);
    }

    async function loadGame() {
        const snapshot = await get(ref(db, 'saveData'));
        if (snapshot.exists()) player = snapshot.val();
        render();
    }

    function render() {
        document.getElementById('p-stats').innerHTML = `HP: ${player.hp}<br>Gold: ${player.gold}`;
        document.getElementById('hour-display').innerText = `Hour ${player.hour + 1}/48`;
    }

    // Logic to increment hour and save
    window.advance = async () => {
        player.hour++;
        player.gold += 10;
        await saveGame();
        render();
    };

    loadGame();
</script>
</body>
</html>
