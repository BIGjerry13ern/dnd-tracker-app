<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OAKHAVEN | The Hustle</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; font-family: 'Courier New', monospace; font-size: 20px; pointer-events: none; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box; }
        .btn { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #00ffcc; display: flex; align-items: center; justify-content: center; color: white; background: rgba(0,255,204,0.1); font-family: sans-serif; }
    </style>
</head>
<body>

<div id="hud">
    <div id="info">PHASE 1 | CASH: $0 | BRICKS: 0/12</div>
</div>

<canvas id="canvas"></canvas>

<div class="controls">
    <div style="display:flex; gap: 20px;">
        <div class="btn" ontouchstart="keys.left=true" ontouchend="keys.left=false">◀</div>
        <div class="btn" ontouchstart="keys.right=true" ontouchend="keys.right=false">▶</div>
    </div>
    <div class="btn" ontouchstart="shoot()" ontouchend="keys.fire=false">FIRE</div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    // Assets
    const hero = new Image(); hero.src = 'hero_spritesheet.png';
    const bg = new Image(); bg.src = 'city_bg.png';

    // Game Logic
    const keys = { left: false, right: false, fire: false };
    const player = { x: 100, y: 400, frame: 0, frameCount: 0, speed: 6 };
    let bullets = [];

    function shoot() {
        bullets.push({ x: player.x + 30, y: player.y + 10, vx: 20 });
    }

    function update() {
        if(keys.left) player.x -= player.speed;
        if(keys.right) player.x += player.speed;

        // Animate based on movement
        if(keys.left || keys.right) {
            player.frameCount++;
            if(player.frameCount % 8 === 0) player.frame = (player.frame + 1) % 4;
        } else {
            player.frame = 0;
        }

        bullets.forEach((b, i) => {
            b.x += b.vx;
            if(b.x > canvas.width) bullets.splice(i, 1);
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw Background
        ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

        // Determine Sprite Row: Idle=0, Run=1, Shoot=2
        const row = keys.fire ? 2 : (keys.left || keys.right ? 1 : 0);
        
        // Draw Player Sprite (Assumes 32x32 frames)
        ctx.drawImage(hero, player.frame * 32, row * 32, 32, 32, player.x, player.y, 96, 96);

        // Draw Bullets
        ctx.fillStyle = '#ffcc00';
        bullets.forEach(b => ctx.fillRect(b.x, b.y, 15, 5));

        update();
        requestAnimationFrame(draw);
    }

    // Input Listeners
    window.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowLeft') keys.left = true;
        if(e.key === 'ArrowRight') keys.right = true;
        if(e.key === ' ') shoot();
    });
    window.addEventListener('keyup', (e) => {
        if(e.key === 'ArrowLeft') keys.left = false;
        if(e.key === 'ArrowRight') keys.right = false;
    });

    draw();
</script>
</body>
</html>
