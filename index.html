<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OAKHAVEN | The Hustle</title>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #hud { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #00ffcc; }
        .controls { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 20px; }
        .btn { width: 70px; height: 70px; background: rgba(0,255,204,0.1); border: 1px solid #00ffcc; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #story-ticker { position: absolute; bottom: 100px; width: 100%; text-align: center; color: #ff0066; font-weight: bold; }
    </style>
</head>
<body>

<div id="hud">
    <div id="stats">PHASE: 1 | CASH: $0 | BRICKS: 0/12 | HEAT: 0</div>
    <div id="status">Status: Working for Boss Jax...</div>
</div>

<div id="story-ticker">KEEP MOVING. CORPORATE DRONES DETECTED.</div>

<canvas id="game"></canvas>

<div class="controls">
    <span class="btn" ontouchstart="keys['a']=true" ontouchend="keys['a']=false">◀</span>
    <span class="btn" ontouchstart="keys['d']=true" ontouchend="keys['d']=false">▶</span>
    <span class="btn" ontouchstart="shoot()" ontouchend="keys[' ']=false">FIRE</span>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const db = getDatabase(initializeApp({
        apiKey: "AIzaSyCqOxn-sFCCOa1koOaDwQumiD8I0h70G-c",
        databaseURL: "https://d-and-d-campaign-hub-default-rtdb.firebaseio.com",
        projectId: "d-and-d-campaign-hub"
    }));

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let p = { x: 100, y: 300, phase: 1, cash: 0, bricks: 0, heat: 0 };
    let bullets = [], enemies = [];
    window.keys = {};

    onValue(ref(db, 'player'), (s) => { if(s.exists()) p = s.val(); });

    function shoot() { bullets.push({x: p.x + 40, y: p.y + 20, vx: 15}); }
    window.shoot = shoot;

    function loop() {
        if(keys['d']) p.x += 7;
        if(keys['a']) p.x -= 7;

        // Difficulty Scaling (The 75hr Grind)
        if(Math.random() < (0.01 + (p.phase * 0.005))) {
            enemies.push({x: canvas.width, y: 300, hp: 20 * p.phase});
        }

        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ffcc'; ctx.fillRect(p.x, p.y, 40, 60);

        bullets.forEach((b, i) => {
            b.x += b.vx;
            ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, 10, 5);
            enemies.forEach((en, ei) => {
                if(b.x > en.x && b.x < en.x+40) {
                    en.hp -= 10;
                    bullets.splice(i, 1);
                    if(en.hp <= 0) { 
                        enemies.splice(ei, 1); 
                        p.cash += (10 * p.phase);
                        p.bricks += 0.1; // Slow progress
                        if(p.bricks >= 12) { p.bricks = 0; p.phase++; p.heat++; }
                        set(ref(db, 'player'), p); 
                    }
                }
            });
        });

        enemies.forEach(en => { en.x -= (3 + p.phase); ctx.fillStyle = '#ff0066'; ctx.fillRect(en.x, en.y, 40, 60); });

        document.getElementById('stats').innerText = `PHASE: ${Math.floor(p.phase)} | CASH: $${Math.floor(p.cash)} | BRICKS: ${Math.floor(p.bricks)}/12 | HEAT: ${p.heat}`;
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
