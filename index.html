<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #debug { position: absolute; top: 10px; right: 10px; color: yellow; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>
    <div id="debug">System: Loading...</div>
    <canvas id="canvas"></canvas>
    <!-- Keep your controls from before here -->

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const debug = document.getElementById('debug');
    let x = 100; // Let's keep it simple: just draw a moving box

    function loop() {
        // Test: Draw a moving red box
        x += 2;
        if (x > canvas.width) x = 0;

        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = 'red';
        ctx.fillRect(x, 100, 50, 50);

        debug.innerText = "System: LOOP ACTIVE | Pos: " + Math.floor(x);
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
