<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OAKHAVEN | PRO ENGINE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box; }
        .joystick { width: 120px; height: 120px; border: 4px solid #00ffcc; border-radius: 50%; background: rgba(0,255,204,0.1); display: flex; align-items: center; justify-content: center; color: #00ffcc; font-weight: bold; }
        .btn { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #ff0066; color: white; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="controls">
    <div id="joy" class="joystick">JOY</div>
    <div style="display: flex; gap: 20px;">
        <div class="btn" ontouchstart="jump()" >JUMP</div>
        <div class="btn" ontouchstart="shoot()" style="border-color:#00ffcc;">FIRE</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    const player = { x: 100, y: 300, vx: 0, vy: 0, facing: 1, isCrouched: false, frame: 0 };
    let bullets = [];

    // Joystick Logic
    const joy = document.getElementById('joy');
    joy.ontouchmove = (e) => {
        let rect = joy.getBoundingClientRect();
        let touch = e.touches[0];
        let dx = touch.clientX - (rect.left + 60);
        let dy = touch.clientY - (rect.top + 60);

        player.vx = dx / 10;
        player.facing = dx > 0 ? 1 : -1;
        player.isCrouched = dy > 30;
        if(dy < -50) jump();
    };
    joy.ontouchend = () => { player.vx = 0; player.isCrouched = false; };

    function jump() { if(player.y > 300) player.vy = -15; }

    function shoot() {
        bullets.push({ x: player.x, y: player.y, vx: player.facing * 20 });
    }

    function update() {
        // Apply Gravity
        player.vy += 0.8;
        player.y += player.vy;
        if(player.y > 300) { player.y = 300; player.vy = 0; }

        // Move and Bound
        player.x += player.vx;
        player.x = Math.max(0, Math.min(canvas.width - 50, player.x));

        bullets.forEach((b, i) => {
            b.x += b.vx;
            if(b.x < 0 || b.x > canvas.width) bullets.splice(i, 1);
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw Player (Debug box)
        ctx.fillStyle = player.isCrouched ? '#ff0066' : '#00ffcc';
        ctx.fillRect(player.x, player.y, 50, player.isCrouched ? 40 : 80);

        // Draw Bullets
        bullets.forEach(b => {
            ctx.fillStyle = 'yellow';
            ctx.fillRect(b.x, b.y, 10, 5);
        });

        update();
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
